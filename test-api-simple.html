<!DOCTYPE html>
<html>
<head>
    <title>Test Course Notes API</title>
</head>
<body>
    <h1>Test Course Notes API</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // First login
                console.log('Logging in...');
                const loginResponse = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'saudausanase@gmail.com',
                        password: 'password123'
                    })
                });
                
                const loginData = await loginResponse.json();
                console.log('Login response:', loginData);
                
                if (!loginData.success) {
                    resultDiv.innerHTML = `<p style="color: red;">Login failed: ${loginData.error}</p>`;
                    return;
                }
                
                const token = loginData.data.token;
                
                // Now test course notes API
                console.log('Testing course notes API...');
                const notesResponse = await fetch('http://localhost:5000/api/course-notes/course/68937dcc7fd4938812659c36', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const notesData = await notesResponse.json();
                console.log('Notes response:', notesData);
                
                resultDiv.innerHTML = `
                    <h3>API Test Results:</h3>
                    <p><strong>Status:</strong> ${notesResponse.status}</p>
                    <p><strong>Success:</strong> ${notesData.success}</p>
                    <pre>${JSON.stringify(notesData, null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
